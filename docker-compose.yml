services:
  media-mcp:
    image: ghcr.io/kylejschultz/media-mcp:latest
    container_name: media-mcp
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/user/appdata/media-stack/media-mcp:/config
    networks:
      - media
    stdin_open: true
    restart: unless-stopped

networks:
  media:
    external: true
    name: docker-network
